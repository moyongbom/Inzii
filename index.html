<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>카페 키오스크</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:sans-serif;
}

body{
    background:#f3f4f6;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.kiosk{
    width:480px;
    height:850px;
    background:white;
    border:12px solid #111827;
    border-radius:32px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    position:relative;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

.tabs{
    display:flex;
    border-bottom:1px solid #ddd;
    background:#f9fafb;
}

.tab{
    flex:1;
    padding:16px;
    border:none;
    background:none;
    cursor:pointer;
    font-weight:bold;
    color:#6b7280;
}

.tab.active{
    background:white;
    color:#2563eb;
    border-bottom:4px solid #2563eb;
}

.tab span{
    display:block;
    font-size:10px;
    font-weight:normal;
}

.menu-grid{
    flex:1;
    overflow-y:auto;
    padding:16px;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:16px;
}

.card{
    border:1px solid #ddd;
    border-radius:16px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

.card img{
    width:100%;
    height:130px;
    object-fit:cover;
}

.card-body{
    padding:12px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    flex:1;
}

.name{
    font-size:18px;
    font-weight:bold;
}

.price{
    color:#2563eb;
    font-weight:bold;
    margin-top:4px;
}

.add-btn{
    margin-top:12px;
    width:100%;
    padding:10px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.cart-bar{
    padding:16px;
    background:#111827;
    color:white;
}

.cart-info{
    display:flex;
    justify-content:space-between;
    margin-bottom:12px;
    font-size:18px;
    font-weight:bold;
}

.pay-btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
}

.payment-screen{
    position:absolute;
    inset:0;
    background:white;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:24px;
}

.payment-screen.active{
    display:flex;
}

.payment-icon{
    font-size:80px;
    margin-bottom:24px;
}

.payment-title{
    font-size:28px;
    font-weight:bold;
    margin-bottom:32px;
}

.home-btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    background:#111827;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="kiosk">

    <div class="tabs" id="tabs"></div>

    <div class="menu-grid" id="menuGrid"></div>

    <div class="cart-bar" id="cartBar" style="display:none;">
        <div class="cart-info">
            <span id="cartCount">주문 0개</span>
            <span id="cartTotal">0원</span>
        </div>

        <button class="pay-btn" onclick="showPayment()">
            결제하기
        </button>
    </div>

    <div class="payment-screen" id="paymentScreen">
        <div class="payment-icon">💳</div>

        <div class="payment-title">
            결제가 완료되었습니다!
        </div>

        <button class="home-btn" onclick="goHome()">
            처음으로
        </button>
    </div>

</div>

<script>

const CATEGORIES = [
    { id:'coffee', ko:'커피', en:'Coffee' },
    { id:'beverage', ko:'음료', en:'Beverage' },
    { id:'dessert', ko:'디저트', en:'Dessert' }
];

const MENU_ITEMS = [
    {
        id:'c1',
        category:'coffee',
        name:'아메리카노',
        price:4500,
        image:'https://images.unsplash.com/photo-1551030173-122aabc4489c'
    },
    {
        id:'c2',
        category:'coffee',
        name:'에스프레소',
        price:4000,
        image:'https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04'
    },
    {
        id:'c3',
        category:'coffee',
        name:'카페라떼',
        price:5000,
        image:'https://images.unsplash.com/photo-1570968915860-54d5c301fa9f'
    },
    {
        id:'b1',
        category:'beverage',
        name:'말차라떼',
        price:5500,
        image:'https://images.unsplash.com/photo-1515823662972-da6a2e4d3002'
    },
    {
        id:'b2',
        category:'beverage',
        name:'딸기라떼',
        price:5500,
        image:'https://images.unsplash.com/photo-1626776822946-4560196237a3'
    },
    {
        id:'b3',
        category:'beverage',
        name:'밀크티',
        price:5500,
        image:'https://images.unsplash.com/photo-1578357078586-491adc1aa5d4'
    },
    {
        id:'b4',
        category:'beverage',
        name:'레몬에이드',
        price:5500,
        image:'https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd'
    },
    {
        id:'d1',
        category:'dessert',
        name:'딸기 빙수',
        price:12000,
        image:'https://images.unsplash.com/photo-1563805042-7684c019e1cb'
    },
    {
        id:'d2',
        category:'dessert',
        name:'바스크 치즈 케이크',
        price:6500,
        image:'https://images.unsplash.com/photo-1565958011703-44f9888ba16c'
    },
    {
        id:'d3',
        category:'dessert',
        name:'허니브레드',
        price:6000,
        image:'https://images.unsplash.com/photo-1517433670603-f72a445474ca'
    }
];

let activeCategory = 'coffee';
let cart = [];

function renderTabs(){

    const tabs = document.getElementById('tabs');

    tabs.innerHTML = '';

    CATEGORIES.forEach(cat => {

        const btn = document.createElement('button');

        btn.className =
            activeCategory === cat.id
            ? 'tab active'
            : 'tab';

        btn.innerHTML =
            `${cat.ko}<span>${cat.en}</span>`;

        btn.onclick = () => {
            activeCategory = cat.id;
            renderTabs();
            renderMenu();
        };

        tabs.appendChild(btn);
    });
}

function renderMenu(){

    const grid =
        document.getElementById('menuGrid');

    grid.innerHTML = '';

    MENU_ITEMS
        .filter(item =>
            item.category === activeCategory
        )
        .forEach(item => {

            const card =
                document.createElement('div');

            card.className = 'card';

            card.innerHTML = `
                <img src="${item.image}" alt="${item.name}">
                <div class="card-body">
                    <div>
                        <div class="name">${item.name}</div>
                        <div class="price">
                            ${item.price.toLocaleString()}원
                        </div>
                    </div>

                    <button class="add-btn">
                        + 담기
                    </button>
                </div>
            `;

            card.querySelector('.add-btn')
                .onclick = () => addToCart(item);

            grid.appendChild(card);
        });
}

function addToCart(item){

    cart.push({
        ...item,
        cartId:Date.now()
    });

    updateCart();
}

function updateCart(){

    const bar =
        document.getElementById('cartBar');

    if(cart.length === 0){

        bar.style.display = 'none';
        return;
    }

    bar.style.display = 'block';

    const total =
        cart.reduce(
            (sum,item)=>sum+item.price,
            0
        );

    document.getElementById('cartCount')
        .textContent =
        `주문 ${cart.length}개`;

    document.getElementById('cartTotal')
        .textContent =
        `${total.toLocaleString()}원`;
}

function showPayment(){

    document
        .getElementById('paymentScreen')
        .classList.add('active');
}

function goHome(){

    cart = [];

    updateCart();

    document
        .getElementById('paymentScreen')
        .classList.remove('active');
}

renderTabs();
renderMenu();

</script>

</body>
</html>
