<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>카페 키오스크 UX 개선안</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Pretendard',sans-serif;
}

body{
background:#F8F6F2;
height:100vh;
}

header{
background:#6F4E37;
color:white;
padding:20px;
font-size:30px;
font-weight:bold;
text-align:center;
}

.container{
display:flex;
height:calc(100vh - 80px);
}

.left{
width:70%;
padding:20px;
overflow:auto;
}

.right{
width:30%;
background:white;
padding:20px;
border-left:3px solid #ddd;
}

.section-title{
font-size:24px;
font-weight:bold;
margin-bottom:15px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tab{
flex:1;
padding:15px;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;
background:white;
border:2px solid #ddd;
}

.tab.active{
background:#D9B382;
border-color:#6F4E37;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:30px;
}

.menu-card{
background:white;
padding:20px;
border-radius:16px;
cursor:pointer;
border:3px solid transparent;
text-align:center;
}

.menu-card:hover{
transform:scale(1.02);
}

.menu-card.selected{
border-color:#6F4E37;
}

.menu-name{
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

.menu-price{
color:#666;
}

.option-group{
margin-bottom:25px;
}

.option-group h3{
margin-bottom:10px;
}

.option-buttons{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.option-btn{
padding:15px 20px;
border:none;
border-radius:10px;
background:white;
border:2px solid #ddd;
cursor:pointer;
font-size:16px;
}

.option-btn.selected{
background:#D9B382;
border-color:#6F4E37;
}

textarea{
width:100%;
height:80px;
padding:10px;
border-radius:10px;
border:2px solid #ddd;
resize:none;
font-size:16px;
}

.summary{
line-height:2;
font-size:18px;
}

.total{
margin-top:20px;
font-size:28px;
font-weight:bold;
color:#6F4E37;
}

.order-btn{
width:100%;
margin-top:30px;
padding:20px;
font-size:24px;
border:none;
border-radius:12px;
background:#6F4E37;
color:white;
cursor:pointer;
}

.order-btn:hover{
opacity:0.9;
}

.complete{
display:none;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
font-size:28px;
}

.complete h1{
margin-bottom:20px;
color:#6F4E37;
}

</style>
</head>

<body>

<header>
☕ 사용자 맞춤형 스마트 키오스크
</header>

<div id="main">

<div class="container">

<div class="left">

<div class="section-title">메뉴 선택</div>

<div class="tabs">
<button class="tab active" onclick="changeCategory('coffee',this)">커피</button>
<button class="tab" onclick="changeCategory('drink',this)">음료</button>
<button class="tab" onclick="changeCategory('dessert',this)">디저트</button>
</div>

<div id="menuGrid" class="menu-grid"></div>

<div class="option-group">
<h3>온도 선택</h3>
<div class="option-buttons">
<button class="option-btn" onclick="selectOption('temperature','HOT',this)">HOT</button>
<button class="option-btn" onclick="selectOption('temperature','ICE',this)">ICE</button>
</div>
</div>

<div class="option-group">
<h3>사이즈</h3>
<div class="option-buttons">
<button class="option-btn" onclick="selectOption('size','Small',this)">Small</button>
<button class="option-btn" onclick="selectOption('size','Medium',this)">Medium</button>
<button class="option-btn" onclick="selectOption('size','Large',this)">Large</button>
</div>
</div>

<div class="option-group">
<h3>컵 종류</h3>
<div class="option-buttons">
<button class="option-btn" onclick="selectOption('cup','매장컵',this)">매장컵</button>
<button class="option-btn" onclick="selectOption('cup','일회용컵',this)">일회용컵</button>
<button class="option-btn" onclick="selectOption('cup','개인 텀블러',this)">개인 텀블러</button>
</div>
</div>

<div class="option-group">
<h3>빠른 요청</h3>
<div class="option-buttons">

<button class="option-btn request-btn" onclick="toggleRequest(this,'얼음 적게')">얼음 적게</button>

<button class="option-btn request-btn" onclick="toggleRequest(this,'얼음 많이')">얼음 많이</button>

<button class="option-btn request-btn" onclick="toggleRequest(this,'시럽 제외')">시럽 제외</button>

<button class="option-btn request-btn" onclick="toggleRequest(this,'덜 달게')">덜 달게</button>

<button class="option-btn request-btn" onclick="toggleRequest(this,'빨대 필요 없음')">빨대 필요 없음</button>

<button class="option-btn request-btn" onclick="toggleRequest(this,'포크 필요 없음')">포크 필요 없음</button>

</div>
</div>

<div class="option-group">
<h3>직접 요청 입력</h3>
<textarea id="customRequest" placeholder="추가 요청사항을 입력해주세요..." oninput="updateSummary()"></textarea>
</div>

</div>

<div class="right">

<h2>주문 요약</h2>

<div class="summary" id="summary">
메뉴를 선택해주세요.
</div>

<button class="order-btn" onclick="order()">
주문 확인
</button>

</div>

</div>

</div>

<div id="complete" class="complete">
<h1>주문이 완료되었습니다!</h1>
<p>예상 대기시간 : 7분</p>
</div>

<script>

const menuData = {

coffee:[
{name:"아메리카노",price:4000},
{name:"에스프레소",price:3500},
{name:"카페라떼",price:5000}
],

drink:[
{name:"말차라떼",price:5500},
{name:"딸기라떼",price:5800},
{name:"밀크티",price:5500},
{name:"레몬에이드",price:6000}
],

dessert:[
{name:"딸기 빙수",price:12000},
{name:"바스크 치즈 케이크",price:6500},
{name:"허니브레드",price:8000}
]

};

let orderData={
menu:null,
price:0,
temperature:"",
size:"",
cup:"",
requests:[]
};

function changeCategory(category,btn){

document.querySelectorAll(".tab")
.forEach(t=>t.classList.remove("active"));

btn.classList.add("active");

renderMenus(category);
}

function renderMenus(category){

const grid=document.getElementById("menuGrid");

grid.innerHTML="";

menuData[category].forEach(item=>{

const card=document.createElement("div");

card.className="menu-card";

card.innerHTML=`
<div class="menu-name">${item.name}</div>
<div class="menu-price">${item.price.toLocaleString()}원</div>
`;

card.onclick=()=>{

document.querySelectorAll(".menu-card")
.forEach(c=>c.classList.remove("selected"));

card.classList.add("selected");

orderData.menu=item.name;
orderData.price=item.price;

updateSummary();
};

grid.appendChild(card);

});
}

function selectOption(type,value,button){

button.parentElement
.querySelectorAll(".option-btn")
.forEach(btn=>btn.classList.remove("selected"));

button.classList.add("selected");

orderData[type]=value;

updateSummary();
}

function toggleRequest(btn,text){

btn.classList.toggle("selected");

if(orderData.requests.includes(text)){

orderData.requests=
orderData.requests.filter(r=>r!==text);

}else{

orderData.requests.push(text);

}

updateSummary();
}

function updateSummary(){

const custom=document
.getElementById("customRequest").value;

document.getElementById("summary").innerHTML=`

<strong>메뉴</strong><br>
${orderData.menu || "-"}

<br><br>

<strong>온도</strong><br>
${orderData.temperature || "-"}

<br><br>

<strong>사이즈</strong><br>
${orderData.size || "-"}

<br><br>

<strong>컵 종류</strong><br>
${orderData.cup || "-"}

<br><br>

<strong>요청사항</strong><br>

${orderData.requests.join(", ") || "-"}

${custom ? "<br>"+custom : ""}

<div class="total">
${orderData.price.toLocaleString()}원
</div>

`;
}

function order(){

if(!orderData.menu){

alert("메뉴를 선택해주세요!");

return;

}

const result=confirm(
"주문을 완료하시겠습니까?"
);

if(result){

document.getElementById("main").style.display="none";
document.getElementById("complete").style.display="flex";

}

}

renderMenus("coffee");

</script>

</body>
</html>
