```html
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>키오스크 주문 시스템</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fade-in { animation: fadeIn 0.25s ease-in-out; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 10px; }
        .line-clamp-1 {
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="w-[480px] h-[850px] mx-auto bg-[#212121] rounded-[3rem] p-4 flex flex-col shadow-2xl relative select-none">
        <!-- 상단 스피커 모양 (단말기 디자인 요소) -->
        <div class="h-12 flex items-center justify-center shrink-0">
            <div class="w-16 h-2 bg-gray-600 rounded-full"></div>
        </div>

        <!-- 메인 화면 컨테이너 -->
        <div id="app" class="flex-1 bg-[#EDEDED] text-[#212121] rounded-[2rem] overflow-hidden relative border-[6px] border-[#212121] flex flex-col">
            <!-- 내용은 자바스크립트로 렌더링 됩니다. -->
        </div>
    </div>

    <script>
        // 데이터
        const MENU_ITEMS = [
            { id: 'c1', name: '아메리카노', price: 4500, category: 'coffee' },
            { id: 'c2', name: '카페라떼', price: 5000, category: 'coffee' },
            { id: 'c3', name: '에스프레소', price: 4000, category: 'coffee' },
            { id: 'b1', name: '말차라떼', price: 5500, category: 'beverage' },
            { id: 'b2', name: '딸기라떼', price: 5500, category: 'beverage' },
            { id: 'b3', name: '밀크티', price: 5500, category: 'beverage' },
            { id: 'b4', name: '레몬에이드', price: 5500, category: 'beverage' },
            { id: 'd1', name: '바스크 치즈 조각 케이크', price: 6500, category: 'dessert' },
            { id: 'd2', name: '딸기빙수', price: 12000, category: 'dessert' },
            { id: 'd3', name: '허니브레드', price: 6000, category: 'dessert' },
        ];

        // 아이콘 SVG 문자열 (Lucide Icons 기반)
        const Icons = {
            ChevronLeft: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>`,
            Plus: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>`,
            X: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>`,
            CreditCard: `<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>`
        };

        // 상태 변수
        let screen = 'menu';
        let activeCategory = 'coffee';
        let selectedItem = null;
        let cart = [];
        let editingCartId = null;
        
        let itemToRemove = null;
        let showPaymentConfirm = false;
        let showPointPrompt = false;
        let showPhoneInput = false;
        let phoneNumber = '';
        
        let options = { 
            temp: 'HOT', cup: '매장컵', shot: '기본', syrup: '없음', ice: '보통', richness: '기본', pearl: '없음', request: '' 
        };

        // 오디오 및 음성 합성
        let audioCtx = null;
        const playChime = () => {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();

                const playNote = (freq, startTime, duration) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, audioCtx.currentTime + startTime);
                    
                    gain.gain.setValueAtTime(0, audioCtx.currentTime + startTime);
                    gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + startTime + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + startTime + duration);
                    
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    
                    osc.start(audioCtx.currentTime + startTime);
                    osc.stop(audioCtx.currentTime + startTime + duration);
                };

                playNote(659.25, 0, 0.15);     // 띨 (E5)
                playNote(880.00, 0.12, 0.3);   // 롱 (A5)
            } catch (e) { console.warn("오디오 재생 실패:", e); }
        };

        const speakText = (text) => {
            try {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'ko-KR';
                    utterance.rate = 1.0;
                    window.speechSynthesis.speak(utterance);
                }
            } catch (e) { console.warn("음성 재생 실패:", e); }
        };

        // 유틸리티 함수
        const getTotalPrice = () => cart.reduce((sum, item) => sum + item.finalPrice, 0);

        const getOptionString = (item) => {
            let parts = [];
            if (item.category !== 'dessert') parts.push(`${item.selectedOptions.temp} / ${item.selectedOptions.cup}`);
            if (item.selectedOptions.syrup !== '없음') parts.push(`${item.selectedOptions.syrup}시럽`);
            if (item.category === 'coffee' && item.selectedOptions.shot !== '기본') parts.push(item.selectedOptions.shot);
            if (item.category === 'beverage' && item.selectedOptions.richness === '진하게') parts.push('농도 진하게');
            if (item.selectedOptions.pearl === '추가') parts.push('펄 추가');
            return parts.join(", ");
        };

        const formatPhoneNumber = (num) => {
            if (!num) return '<span class="text-gray-300">010-XXXX-XXXX</span>';
            if (num.length <= 3) return num;
            if (num.length <= 7) return `${num.slice(0, 3)}-${num.slice(3)}`;
            return `${num.slice(0, 3)}-${num.slice(3, 7)}-${num.slice(7)}`;
        };

        // 액션 함수
        window.handleCategoryClick = (cat) => { playChime(); activeCategory = cat; render(); };
        
        window.handleSelectMenu = (id) => {
            playChime();
            selectedItem = MENU_ITEMS.find(m => m.id === id);
            options = { temp: 'HOT', cup: '매장컵', shot: '기본', syrup: '없음', ice: '보통', richness: '기본', pearl: '없음', request: '' };
            editingCartId = null;
            screen = 'options';
            render();
        };

        window.handleEditCartItem = (cartId) => {
            playChime();
            const item = cart.find(c => c.cartId === cartId);
            selectedItem = MENU_ITEMS.find(m => m.id === item.id);
            options = { ...item.selectedOptions };
            editingCartId = cartId;
            screen = 'options';
            render();
        };

        window.handleOptionChange = (key, value) => {
            playChime();
            options[key] = value;
            render();
        };

        window.updateRequest = (value) => {
            // 인풋 필드 타이핑 중 전체 재렌더링 방지
            options.request = value;
        };

        window.handleAddToCart = () => {
            playChime();
            let finalPrice = selectedItem.price;
            if (options.shot === '1샷 추가') finalPrice += 500;
            if (options.shot === '2샷 추가') finalPrice += 1000;
            if (options.syrup === '바닐라' || options.syrup === '헤이즐넛') finalPrice += 500;
            if (options.pearl === '추가') finalPrice += 500;
            
            if (editingCartId) {
                const index = cart.findIndex(item => item.cartId === editingCartId);
                cart[index] = { ...selectedItem, selectedOptions: { ...options }, finalPrice, cartId: editingCartId };
                editingCartId = null;
            } else {
                cart.push({ ...selectedItem, selectedOptions: { ...options }, finalPrice, cartId: Date.now() });
            }
            screen = 'menu';
            render();
        };

        window.handleAttemptRemove = (cartId) => {
            playChime();
            itemToRemove = cartId;
            speakText("주문을 취소하시겠습니까?");
            render();
        };
        window.confirmRemove = () => { playChime(); cart = cart.filter(item => item.cartId !== itemToRemove); itemToRemove = null; render(); };
        window.cancelRemove = () => { playChime(); itemToRemove = null; render(); };

        window.handleAttemptPayment = () => {
            playChime();
            showPaymentConfirm = true;
            speakText("결제하시겠습니까?");
            render();
        };
        window.cancelPayment = () => { playChime(); showPaymentConfirm = false; render(); };
        window.confirmPayment = () => {
            playChime();
            showPaymentConfirm = false;
            showPointPrompt = true;
            speakText("포인트 적립 하시겠습니까?");
            render();
        };

        window.handlePointYes = () => {
            playChime();
            showPointPrompt = false;
            phoneNumber = '';
            showPhoneInput = true;
            speakText("전화번호를 입력해 주세요.");
            render();
        };
        window.handlePointNo = () => {
            playChime();
            showPointPrompt = false;
            screen = 'payment';
            speakText("카드를 꽂아주세요.");
            render();
        };

        window.handleKeypadPress = (key) => {
            playChime();
            if (key === '초기화') phoneNumber = '';
            else if (key === '지우기') phoneNumber = phoneNumber.slice(0, -1);
            else if (phoneNumber.length < 11) phoneNumber += key;
            render();
        };
        window.handlePhoneSubmit = () => {
            playChime();
            showPhoneInput = false;
            screen = 'payment';
            speakText("카드를 꽂아주세요.");
            render();
        };
        window.handlePhoneCancel = () => {
            playChime();
            showPhoneInput = false;
            showPointPrompt = true;
            speakText("포인트 적립 하시겠습니까?");
            render();
        };

        window.handleScreenChange = (newScreen) => { playChime(); screen = newScreen; render(); };

        window.completePayment = () => {
            playChime();
            cart = [];
            screen = 'menu';
            alert('결제가 정상적으로 완료되었습니다.');
            render();
        };


        // 렌더링 엔진
        function render() {
            const app = document.getElementById('app');
            let html = '';

            // 1. 메인 메뉴 화면
            if (screen === 'menu') {
                html += `
                <div class="fade-in flex flex-col h-full">
                    <div class="flex border-b border-gray-200 bg-[#F5F5F5] shrink-0">
                        ${['coffee', 'beverage', 'dessert'].map(cat => `
                            <button onclick="handleCategoryClick('${cat}')" class="flex-1 py-5 text-xl font-bold transition-all ${activeCategory === cat ? 'bg-[#EDEDED] border-b-4 border-[#212121] text-[#212121]' : 'text-gray-400 hover:bg-gray-200'}">
                                ${cat === 'coffee' ? '커피' : cat === 'beverage' ? '음료' : '디저트'}
                            </button>
                        `).join('')}
                    </div>

                    <div class="flex-1 overflow-y-auto p-4 grid grid-cols-2 gap-4 content-start bg-[#EDEDED]">
                        ${MENU_ITEMS.filter(i => i.category === activeCategory).map(item => `
                            <button onclick="handleSelectMenu('${item.id}')" class="bg-[#F5F5F5] border border-gray-200 rounded-2xl p-4 flex flex-col items-center shadow-sm hover:border-[#212121] transition-colors">
                                <div class="w-full h-32 bg-[#EDEDED] rounded-xl mb-3 flex items-center justify-center text-sm font-bold text-gray-400 border border-gray-100 overflow-hidden"></div>
                                <p class="font-bold text-lg mb-1">${item.name}</p>
                                <p class="font-bold text-xl mb-3">${item.price.toLocaleString()}원</p>
                                <div class="w-full py-3 bg-[#212121] text-white rounded-xl font-bold flex justify-center items-center gap-1">
                                    ${Icons.Plus} 담기
                                </div>
                            </button>
                        `).join('')}
                    </div>

                    ${cart.length > 0 ? `
                        <div class="bg-[#F5F5F5] border-t border-gray-200 shadow-[0_-5px_20px_rgba(0,0,0,0.08)] flex flex-col shrink-0 max-h-[320px] rounded-t-3xl">
                            <div class="px-5 py-3 border-b border-gray-200 flex justify-between items-center shrink-0">
                                <span class="font-bold text-gray-500">주문 목록 (${cart.length})</span>
                            </div>
                            
                            <div class="flex-1 overflow-y-auto p-4 space-y-3">
                                ${cart.map(item => `
                                    <div onclick="handleEditCartItem(${item.cartId})" class="flex justify-between items-center bg-[#EDEDED] border border-gray-200 p-3 rounded-xl cursor-pointer hover:bg-gray-200 active:bg-gray-300 transition-colors">
                                        <div class="flex flex-col flex-1">
                                            <span class="font-bold text-lg leading-tight">${item.name}</span>
                                            <span class="text-xs text-gray-500 mt-1 font-medium line-clamp-1">
                                                ${getOptionString(item)}
                                            </span>
                                        </div>
                                        <div class="flex items-center gap-4 ml-2">
                                            <span class="font-bold text-lg">${item.finalPrice.toLocaleString()}원</span>
                                            <button onclick="event.stopPropagation(); handleAttemptRemove(${item.cartId});" class="p-2 bg-[#F5F5F5] rounded-full border border-gray-200 text-gray-400 hover:text-red-500 shadow-sm transition-colors">
                                                ${Icons.X}
                                            </button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>

                            <div class="p-4 bg-[#F5F5F5] shrink-0">
                                <button onclick="handleAttemptPayment()" class="w-full py-4 bg-[#212121] text-white rounded-xl text-2xl font-bold flex justify-between px-6 items-center shadow-lg active:scale-[0.98] transition-transform">
                                    <span>결제하기</span>
                                    <span>${getTotalPrice().toLocaleString()}원</span>
                                </button>
                            </div>
                        </div>
                    ` : ''}
                </div>`;
            }

            // 2. 옵션 화면
            if (screen === 'options' && selectedItem) {
                html += `
                <div class="fade-in flex flex-col h-full bg-[#EDEDED]">
                    <div class="px-5 py-4 border-b border-gray-200 bg-[#F5F5F5] flex items-center gap-3 shrink-0">
                        <button onclick="handleScreenChange('menu')" class="p-2 rounded-full bg-[#EDEDED] hover:bg-gray-200">
                            ${Icons.ChevronLeft}
                        </button>
                        <h2 class="text-xl font-bold">${selectedItem.name} 상세 선택</h2>
                    </div>

                    <div class="flex-1 overflow-y-auto p-6 space-y-8 pb-32">
                        ${(selectedItem.category === 'coffee' || selectedItem.category === 'beverage') ? `
                            <section>
                                <p class="font-bold mb-3 text-lg">온도 선택</p>
                                <div class="grid grid-cols-2 gap-3">
                                    ${['HOT', 'ICE'].map(t => `<button onclick="handleOptionChange('temp', '${t}')" class="py-4 rounded-xl border-2 font-bold text-lg transition-colors ${options.temp === t ? 'bg-[#212121] border-[#212121] text-white' : 'bg-[#F5F5F5] border-gray-200 text-gray-500'}">${t}</button>`).join('')}
                                </div>
                            </section>
                            <section>
                                <p class="font-bold mb-3 text-lg">컵 종류</p>
                                <div class="grid grid-cols-3 gap-3">
                                    ${['매장컵', '개인텀블러', '일회용컵'].map(c => `<button onclick="handleOptionChange('cup', '${c}')" class="py-4 rounded-xl border-2 font-bold transition-colors ${options.cup === c ? 'bg-[#212121] border-[#212121] text-white' : 'bg-[#F5F5F5] border-gray-200 text-gray-500'}">${c}</button>`).join('')}
                                </div>
                            </section>
                            <section>
                                <p class="font-bold mb-3 text-lg">시럽 추가 (+500원)</p>
                                <div class="grid grid-cols-3 gap-3">
                                    ${['없음', '바닐라', '헤이즐넛'].map(s => `<button onclick="handleOptionChange('syrup', '${s}')" class="py-4 rounded-xl border-2 font-bold transition-colors ${options.syrup === s ? 'bg-[#212121] border-[#212121] text-white' : 'bg-[#F5F5F5] border-gray-200 text-gray-500'}">${s}</button>`).join('')}
                                </div>
                            </section>
                            ${options.temp === 'ICE' ? `
                                <section>
                                    <p class="font-bold mb-3 text-lg">얼음 양</p>
                                    <div class="grid grid-cols-3 gap-3">
                                        ${['적게', '보통', '많이'].map(i => `<button onclick="handleOptionChange('ice', '${i}')" class="py-4 rounded-xl border-2 font-bold transition-colors ${options.ice === i ? 'bg-[#212121] border-[#212121] text-white' : 'bg-[#F5F5F5] border-gray-200 text-gray-500'}">${i}</button>`).join('')}
                                    </div>
                                </section>
                            ` : ''}
                        ` : ''}

                        ${selectedItem.category === 'coffee' ? `
                            <section>
                                <p class="font-bold mb-3 text-lg">샷 추가 (+500원)</p>
                                <div class="grid grid-cols-3 gap-3">
                                    ${['기본', '1샷 추가', '2샷 추가'].map(s => `<button onclick="handleOptionChange('shot', '${s}')" class="py-4 rounded-xl border-2 font-bold transition-colors ${options.shot === s ? 'bg-[#212121] border-[#212121] text-white' : 'bg-[#F5F5F5] border-gray-200 text-gray-500'}">${s}</button>`).join('')}
                                </div>
                            </section>
                        ` : ''}

                        ${selectedItem.category === 'beverage' ? `
                            <section>
                                <p class="font-bold mb-3 text-lg">농도 조절</p>
                                <div class="grid grid-cols-2 gap-3">
                                    ${['기본', '진하게'].map(r => `<button onclick="handleOptionChange('richness', '${r}')" class="py-4 rounded-xl border-2 font-bold text-lg transition-colors ${options.richness === r ? 'bg-[#212121] border-[#212121] text-white' : 'bg-[#F5F5F5] border-gray-200 text-gray-500'}">${r}</button>`).join('')}
                                </div>
                            </section>
                        ` : ''}

                        ${['말차라떼', '딸기라떼', '밀크티'].includes(selectedItem.name) ? `
                            <section>
                                <p class="font-bold mb-3 text-lg">타피오카 펄 추가 (+500원)</p>
                                <div class="grid grid-cols-2 gap-3">
                                    ${['없음', '추가'].map(p => `<button onclick="handleOptionChange('pearl', '${p}')" class="py-4 rounded-xl border-2 font-bold text-lg transition-colors ${options.pearl === p ? 'bg-[#212121] border-[#212121] text-white' : 'bg-[#F5F5F5] border-gray-200 text-gray-500'}">${p}</button>`).join('')}
                                </div>
                            </section>
                        ` : ''}

                        <section>
                            <p class="font-bold mb-3 text-lg">기타 요청사항</p>
                            <input 
                                type="text" 
                                placeholder="예: 덜 달게 해주세요" 
                                class="w-full p-4 bg-[#F5F5F5] border-2 border-gray-200 rounded-xl font-medium focus:border-[#212121] focus:outline-none" 
                                value="${options.request}" 
                                oninput="updateRequest(this.value)" 
                            />
                        </section>
                    </div>

                    <div class="absolute bottom-0 w-full p-4 bg-[#F5F5F5] border-t border-gray-200 flex gap-3 shrink-0 shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
                        <button onclick="handleScreenChange('menu')" class="w-1/3 py-4 bg-[#EDEDED] rounded-xl font-bold text-lg text-gray-600 hover:bg-gray-300">취소</button>
                        <button onclick="handleAddToCart()" class="w-2/3 py-4 bg-[#212121] text-white rounded-xl font-bold text-xl">${editingCartId ? '옵션 변경 완료' : '장바구니 담기'}</button>
                    </div>
                </div>`;
            }

            // 3. 결제 화면
            if (screen === 'payment') {
                html += `
                <div class="fade-in absolute inset-0 bg-[#EDEDED] z-50 flex flex-col items-center justify-center p-10">
                    <div class="text-[#212121] mb-8">${Icons.CreditCard}</div>
                    <h2 class="text-3xl font-bold mb-4 text-[#212121]">카드를 꽂아주세요</h2>
                    <p class="text-lg text-gray-500 mb-10 font-medium">결제가 완료될 때까지 카드를 빼지 마세요.</p>
                    <div class="w-full p-6 bg-[#F5F5F5] rounded-2xl border border-gray-200 text-center mb-10 shadow-sm">
                        <p class="text-gray-500 mb-2">최종 결제 금액</p>
                        <p class="text-4xl font-black text-[#212121]">${getTotalPrice().toLocaleString()}원</p>
                    </div>
                    <button onclick="completePayment()" class="w-full py-5 bg-gray-300 text-[#212121] rounded-2xl text-xl font-bold hover:bg-gray-400 transition">
                        처음으로 (결제 시뮬레이션 종료)
                    </button>
                </div>`;
            }

            // 모달들
            if (itemToRemove !== null) {
                html += `
                <div class="fade-in absolute inset-0 bg-black/60 z-[100] flex items-center justify-center p-6">
                    <div class="bg-[#F5F5F5] rounded-3xl p-8 w-full shadow-2xl text-center border-[6px] border-[#212121]">
                        <h3 class="text-2xl font-bold text-[#212121] mb-8">주문을 취소하시겠습니까?</h3>
                        <div class="flex gap-3">
                            <button onclick="cancelRemove()" class="flex-1 py-4 bg-gray-300 text-[#212121] rounded-xl font-bold text-lg hover:bg-gray-400">아니오</button>
                            <button onclick="confirmRemove()" class="flex-1 py-4 bg-[#212121] text-white rounded-xl font-bold text-lg">예, 취소합니다</button>
                        </div>
                    </div>
                </div>`;
            }

            if (showPaymentConfirm) {
                html += `
                <div class="fade-in absolute inset-0 bg-black/60 z-[100] flex items-center justify-center p-6">
                    <div class="bg-[#F5F5F5] rounded-3xl p-8 w-full shadow-2xl text-center border-[6px] border-[#212121]">
                        <h3 class="text-2xl font-bold text-[#212121] mb-8">결제하시겠습니까?</h3>
                        <div class="flex gap-3">
                            <button onclick="cancelPayment()" class="flex-1 py-4 bg-gray-300 text-[#212121] rounded-xl font-bold text-lg hover:bg-gray-400">아니오</button>
                            <button onclick="confirmPayment()" class="flex-1 py-4 bg-[#212121] text-white rounded-xl font-bold text-lg">예, 결제합니다</button>
                        </div>
                    </div>
                </div>`;
            }

            if (showPointPrompt) {
                html += `
                <div class="fade-in absolute inset-0 bg-black/60 z-[100] flex items-center justify-center p-6">
                    <div class="bg-[#F5F5F5] rounded-3xl p-8 w-full shadow-2xl text-center border-[6px] border-[#212121]">
                        <h3 class="text-2xl font-bold text-[#212121] mb-8">포인트 적립 하시겠습니까?</h3>
                        <div class="flex gap-3">
                            <button onclick="handlePointNo()" class="flex-1 py-4 bg-gray-300 text-[#212121] rounded-xl font-bold text-lg hover:bg-gray-400">아니오</button>
                            <button onclick="handlePointYes()" class="flex-1 py-4 bg-[#212121] text-white rounded-xl font-bold text-lg">예, 적립합니다</button>
                        </div>
                    </div>
                </div>`;
            }

            if (showPhoneInput) {
                html += `
                <div class="fade-in absolute inset-0 bg-black/60 z-[100] flex items-center justify-center p-4">
                    <div class="bg-[#F5F5F5] rounded-3xl p-6 w-full shadow-2xl border-[6px] border-[#212121] flex flex-col items-center">
                        <h3 class="text-xl font-bold text-[#212121] mb-1">전화번호 입력</h3>
                        <p class="text-[13px] font-bold text-blue-600 mb-6 bg-blue-50 px-3 py-1 rounded-full">
                            ※ 포인트 적립시 결제한 금액의 5%가 적립이 됩니다.
                        </p>

                        <div class="w-full bg-white border-2 border-gray-300 rounded-xl p-4 mb-5 text-center text-3xl font-bold tracking-widest h-16 flex items-center justify-center text-[#212121]">
                            ${formatPhoneNumber(phoneNumber)}
                        </div>

                        <div class="grid grid-cols-3 gap-3 w-full mb-6">
                            ${['1', '2', '3', '4', '5', '6', '7', '8', '9', '초기화', '0', '지우기'].map(key => `
                                <button onclick="handleKeypadPress('${key}')" class="py-4 rounded-xl font-bold text-xl shadow-sm transition-transform active:scale-95 ${key === '초기화' || key === '지우기' ? 'bg-gray-300 text-[#212121]' : 'bg-white border-2 border-gray-200 text-[#212121] hover:bg-gray-50'}">
                                    ${key}
                                </button>
                            `).join('')}
                        </div>

                        <div class="flex gap-3 w-full">
                            <button onclick="handlePhoneCancel()" class="flex-1 py-4 bg-gray-300 text-[#212121] rounded-xl font-bold text-lg hover:bg-gray-400">이전</button>
                            <button onclick="handlePhoneSubmit()" ${phoneNumber.length < 11 ? 'disabled' : ''} class="flex-1 py-4 rounded-xl font-bold text-lg transition-colors ${phoneNumber.length === 11 ? 'bg-[#212121] text-white' : 'bg-gray-400 text-gray-200 cursor-not-allowed'}">입력 완료</button>
                        </div>
                    </div>
                </div>`;
            }

            app.innerHTML = html;
        }

        // 초기 렌더링
        render();
    </script>
</body>
</html>
